<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevMotion</title>

    <style type="text/css">
        html, body {
            margin: 0;
            height: 100%;
        }

        .logo-wrapper {
            position: relative;
            height: 100%;
        }
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div class="logo-wrapper">
    <img class="logo" src="assets/img/logo_cleanblue_dark_250.png">
</div>

</body>
</html>
